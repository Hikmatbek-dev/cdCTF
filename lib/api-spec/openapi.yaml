        nickname:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
          nullable: true
        points:
          type: integer
        rank:
          type: integer
        isBlocked:
          type: boolean
        solvedCtf:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              category:
                type: string
              points:
                type: integer
              solvedAt:
                type: string
                format: date-time
            required: [id, name, category, points, solvedAt]
        completedLessons:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              points:
                type: integer
              completedAt:
                type: string
                format: date-time
            required: [id, title, points, completedAt]
        competitionHistory:
          type: array
          items:
            type: object
            properties:
              competitionId:
                type: integer
              competitionName:
                type: string
              rank:
                type: integer
              points:
                type: integer
            required: [competitionId, competitionName, rank, points]
        titles:
          type: array
          items:
            $ref: "#/components/schemas/Title"
        createdAt:
          type: string
          format: date-time
      required: [id, nickname, email, points, rank, isBlocked, solvedCtf, completedLessons, competitionHistory, titles, createdAt]

    UpdateProfileBody:
      type: object
      properties:
        nickname:
          type: string
          minLength: 3
          maxLength: 32

        avatarUrl:
          type: string
          nullable: true
        points:
          type: integer
          description: Admin only.
        role:
          type: string
          enum:
          - user
          - author
          - moderator
          - admin
          description: Admin only.
        isBlocked:
          type: boolean
          description: Admin only.
        email:
          type: string
          format: email
          description: Admin only.
        emailVerified:
          type: boolean
          description: Admin only.
      description: Fields this endpoint accepts. Which of them a caller may actually set depends on their role (columnPermissions in rbac.ts); anything they may not set is dropped, and a request left with nothing to update is rejected.
    AvatarResponse:
      type: object
      properties:
        avatarUrl:
          type: string
      required: [avatarUrl]

    Title:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        points:
          type: integer
          description: Bonus points for earning this title
        earnedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, name, category, points]

    # Admin
    LearnAnalyticsModule:
      type: object
