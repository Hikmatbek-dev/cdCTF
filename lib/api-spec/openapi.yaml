openapi: 3.1.0
info:
  title: cdCTF API
  version: 0.1.0
  description: cdCTF API
servers:
- url: /api
  description: Base API path
tags:
- name: health
- name: auth
- name: ctf
- name: learn
- name: scoreboard
- name: competitions
- name: profile
- name: admin
- name: titles

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with nickname and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email:
    get:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email with token
      parameters:
      - in: query
        name: token
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # CTF
  /ctf:
    get:
      operationId: listCtfChallenges
      tags: [ctf]
      summary: List CTF challenges
      parameters:
      - in: query
        name: category
        schema:
          type: string
      - in: query
        name: difficulty
        schema:
          type: string
          enum: [easy, medium, hard, insane]
      - in: query
        name: solved
        schema:
          type: boolean
      - in: query
        name: search
        schema:
          type: string
      - in: query
        name: minPoints
        schema:
          type: integer
      - in: query
        name: maxPoints
        schema:
          type: integer
      responses:
        "200":
          description: List of CTF challenges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CtfChallenge"

  /ctf/{id}:
    get:
      operationId: getCtfChallenge
      tags: [ctf]
      summary: Get a CTF challenge by ID
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: CTF challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CtfChallengeDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ctf/{id}/submit:
    post:
      operationId: submitCtfFlag
      tags: [ctf]
      summary: Submit a flag for a CTF challenge
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFlagBody"
      responses:
        "200":
          description: Flag submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlagSubmitResponse"
        "403":
          description: Blocked or already solved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /learn/categories:
    get:
      operationId: listLearnCategories
      tags: [learn]
      summary: List learning categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LearnCategory"

  /learn/lessons:
    get:
      operationId: listLessons
      tags: [learn]
      summary: List lessons
      parameters:
      - in: query
        name: category
        schema:
          type: string
      responses:
        "200":
          description: Lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lesson"

  /learn/lessons/{id}:
    get:
      operationId: getLesson
      tags: [learn]
      summary: Get lesson detail
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Lesson detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /learn/lessons/{id}/test/start:
    post:
      operationId: startLessonTest
      tags: [learn]
      summary: Start a lesson test (activates anti-cheat)
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Test started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestStartResponse"
        "403":
          description: Blocked or max attempts reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /learn/lessons/{id}/test/submit:
    post:
      operationId: submitLessonTest
      tags: [learn]
      summary: Submit lesson test answers
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTestBody"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestResult"
        "403":
          description: Blocked or not started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /learn/lessons/{id}/test/escape:
    post:
      operationId: reportTestEscape
      tags: [learn]
      summary: Report ESC key press during test (anti-cheat)
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Escape handled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EscapeResponse"

  # MODULES — an ordered course of lessons, a final exam, and a certificate.
  /learn/modules:
    get:
      operationId: listModules
      tags: [learn]
      summary: List published modules with the caller's progress
      responses:
        "200":
          description: Modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModuleSummary"

  /learn/modules/{id}:
    get:
      operationId: getModule
      tags: [learn]
      summary: Get a module with its lessons and exam state
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Module detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModuleDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /learn/modules/{id}/exam/start:
    post:
      operationId: startModuleExam
      tags: [learn]
      summary: Start the final exam (requires every lesson finished)
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Exam started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamStartResponse"
        "403":
          description: Lessons not finished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /learn/modules/{id}/exam/submit:
    post:
      operationId: submitModuleExam
      tags: [learn]
      summary: Submit final exam answers
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTestBody"
      responses:
        "200":
          description: Exam result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"
        "400":
          description: Invalid session or duplicate answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /learn/modules/{id}/certificate:
    post:
      operationId: issueCertificate
      tags: [learn]
      summary: Issue the certificate for a passed module
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCertificateBody"
      responses:
        "200":
          description: Certificate (already issued)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
        "201":
          description: Certificate issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
        "403":
          description: Exam not passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /learn/certificates/{serial}:
    get:
      operationId: verifyCertificate
      tags: [learn]
      summary: Verify a certificate by its serial (public)
      parameters:
      - in: path
        name: serial
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Certificate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateVerification"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /learn/diploma:
    get:
      operationId: getDiplomaStatus
      tags: [learn]
      summary: The caller's program standing and diploma state
      responses:
        "200":
          description: Diploma status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiplomaStatus"
    post:
      operationId: issueDiploma
      tags: [learn]
      summary: Issue the program diploma once every module is passed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCertificateBody"
      responses:
        "200":
          description: Diploma (already issued)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diploma"
        "201":
          description: Diploma issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diploma"
        "403":
          description: Not all modules passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /learn/diploma/{serial}:
    get:
      operationId: verifyDiploma
      tags: [learn]
      summary: Verify a program diploma by its serial (public)
      parameters:
      - in: path
        name: serial
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Diploma
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiplomaVerification"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # SCOREBOARD
  /scoreboard:
    get:
      operationId: getScoreboard
      tags: [scoreboard]
      summary: Get global scoreboard
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
          default: 50
      - in: query
        name: offset
        schema:
          type: integer
          default: 0
      responses:
        "200":
          description: Scoreboard entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreboardResponse"

  # COMPETITIONS
  /competitions:
    get:
      operationId: listCompetitions
      tags: [competitions]
      summary: List competitions
      responses:
        "200":
          description: Competitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Competition"

  /competitions/{id}:
    get:
      operationId: getCompetition
      tags: [competitions]
      summary: Get competition detail
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Competition detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitionDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /competitions/{id}/join:
    post:
      operationId: joinCompetition
      tags: [competitions]
      summary: Join a competition
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Cannot join
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /competitions/{id}/scoreboard:
    get:
      operationId: getCompetitionScoreboard
      tags: [competitions]
      summary: Get competition scoreboard
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Competition scoreboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScoreboardEntry"

  # PROFILE
  /users/{id}:
    get:
      operationId: getUserProfile
      tags: [profile]
      summary: Get user profile
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateUserProfile
      tags: [profile]
      summary: Update user profile
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"


    delete:
      operationId: deleteAccount
      tags: [users]
      summary: Delete an account — the caller's own, or any as an admin
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/learn-analytics:
    get:
      operationId: getLearnAnalytics
      tags: [admin]
      summary: The learning funnel per module — where learners drop off
      responses:
        "200":
          description: Learning analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LearnAnalytics"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users
      parameters:
      - in: query
        name: search
        schema:
          type: string
      - in: query
        name: limit
        schema:
          type: integer
          default: 50
      - in: query
        name: offset
        schema:
          type: integer
          default: 0
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"

  /admin/users/{id}/block:
    post:
      operationId: adminBlockUser
      tags: [admin]
      summary: Block a user
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: User blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/users/{id}/unblock:
    post:
      operationId: adminUnblockUser
      tags: [admin]
      summary: Unblock a user
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: User unblocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/ctf:
    post:
      operationId: adminCreateCtf
      tags: [admin]
      summary: Create a CTF challenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCtfBody"
      responses:
        "201":
          description: CTF created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CtfChallengeDetail"

    get:
      operationId: listAdminCtf
      tags: [admin]
      summary: Every challenge, drafts included
      responses:
        "200":
          description: Challenges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCtfListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/ctf/{id}:
    put:
      operationId: adminUpdateCtf
      tags: [admin]
      summary: Update a CTF challenge
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCtfBody"
      responses:
        "200":
          description: CTF updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CtfChallengeDetail"

    delete:
      operationId: adminDeleteCtf
      tags: [admin]
      summary: Delete a CTF challenge
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: CTF deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

    get:
      operationId: getAdminCtf
      tags: [admin]
      summary: One challenge, as stored
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCtfTask"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateCtf
      tags: [admin]
      summary: Update a challenge
      description: >-
        Fields are filtered by role: an author may edit their own content but not
        its points or publish state.
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCtfBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCtfTask"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/ctf/{id}/unblock-user/{userId}:
    post:
      operationId: adminUnblockCtfUser
      tags: [admin]
      summary: Unblock a user from a specific CTF
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      - in: path
        name: userId
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: User unblocked for CTF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/blocked-tasks:
    get:
      operationId: adminGetBlockedTasks
      tags: [admin]
      summary: Get all blocked CTFs and lessons
      responses:
        "200":
          description: Blocked tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedTasksResponse"

  /admin/blocked-tasks/{type}/{taskId}/unblock/{userId}:
    post:
      operationId: adminUnblockTask
      tags: [admin]
      summary: Unblock a task for a user
      parameters:
      - in: path
        name: type
        required: true
        schema:
          type: string
          enum: [ctf, lesson]
      - in: path
        name: taskId
        required: true
        schema:
          type: integer
      - in: path
        name: userId
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Task unblocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/competitions:
    post:
      operationId: adminCreateCompetition
      tags: [admin]
      summary: Create a competition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompetitionBody"
      responses:
        "201":
          description: Competition created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competition"

  /admin/competitions/{id}:
    put:
      operationId: adminUpdateCompetition
      tags: [admin]
      summary: Update a competition
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompetitionBody"
      responses:
        "200":
          description: Competition updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competition"

    patch:
      operationId: updateCompetition
      tags: [admin]
      summary: Update a competition
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompetitionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competition"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ADMIN — USERS AND OPS
  /admin/competitions/{id}/users/{userId}:
    post:
      operationId: adminAddCompetitionUser
      tags: [admin]
      summary: Add user to private competition
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      - in: path
        name: userId
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: User added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /admin/lessons:
    post:
      operationId: adminCreateLesson
      tags: [admin]
      summary: Create a lesson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonBody"
      responses:
        "201":
          description: Lesson created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonDetail"

    get:
      operationId: listAdminLessons
      tags: [admin]
      summary: Every lesson, drafts included
      responses:
        "200":
          description: Lessons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLessonListResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/lessons/{id}:
    put:
      operationId: adminUpdateLesson
      tags: [admin]
      summary: Update a lesson
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonBody"
      responses:
        "200":
          description: Lesson updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonDetail"

    delete:
      operationId: adminDeleteLesson
      tags: [admin]
      summary: Delete a lesson
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Lesson deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

    get:
      operationId: getAdminLesson
      tags: [admin]
      summary: One lesson with its questions and correct answers
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLesson"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateLesson
      tags: [admin]
      summary: Update a lesson and optionally replace its questions
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLessonBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLesson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Current user and their permissions, or null when signed out
      description: >-
        Permissions are derived server-side from the role. The client must not
        keep its own copy of the permission table, and must not trust anything
        it cached: this is authorisation.
      responses:
        "200":
          description: Session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"

  /auth/sessions:
    get:
      operationId: listSessions
      tags: [auth]
      summary: Every device currently signed in as the caller
      responses:
        "200":
          description: Live sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/SessionRequired"

  /auth/sessions/{id}:
    delete:
      operationId: revokeSession
      tags: [auth]
      summary: Sign a single device out
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/sessions/revoke-all:
    post:
      operationId: revokeOtherSessions
      tags: [auth]
      summary: Sign out everywhere except this device
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeAllResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/login-history:
    get:
      operationId: getLoginHistory
      tags: [auth]
      summary: The caller's recent sign-in attempts, successful or not
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # AUTH — PASSWORD
  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password; signs out every other device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Send a reset link
      description: >-
        Always answers the same whether or not the address is registered —
        a differing response would be an account-enumeration oracle.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordBody"
      responses:
        "200":
          description: Sent if the account exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset a password with an emailed token; revokes every session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      summary: Resend the verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordBody"
      responses:
        "200":
          description: Sent if the account exists and is unverified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/2fa/status:
    get:
      operationId: getTwoFactorStatus
      tags: [auth]
      summary: Whether 2FA is on, and how many backup codes remain
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/2fa/setup:
    post:
      operationId: setupTwoFactor
      tags: [auth]
      summary: Begin enrolment and return the secret to scan
      description: >-
        Does nothing on its own — /auth/2fa/enable must prove the user can
        produce a code from this secret before 2FA turns on.
      responses:
        "200":
          description: Enrolment secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorSetupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Already enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/2fa/enable:
    post:
      operationId: enableTwoFactor
      tags: [auth]
      summary: Confirm enrolment; returns the backup codes
      description: The only time the backup codes are readable — they are stored hashed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorCodeBody"
      responses:
        "200":
          description: Enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupCodesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/2fa/disable:
    post:
      operationId: disableTwoFactor
      tags: [auth]
      summary: Turn 2FA off — needs the password and a live code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisableTwoFactorBody"
      responses:
        "200":
          description: Disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/2fa/backup-codes:
    post:
      operationId: regenerateBackupCodes
      tags: [auth]
      summary: Issue a fresh set of backup codes, invalidating the old ones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordBody"
      responses:
        "200":
          description: New codes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupCodesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/2fa/verify:
    post:
      operationId: verifyTwoFactor
      tags: [auth]
      summary: Exchange an mfaToken plus a code for a session
      description: Accepts either a 6-digit TOTP code or a single-use backup code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyTwoFactorBody"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # AUTH — PASSKEYS
  /auth/passkeys:
    get:
      operationId: listPasskeys
      tags: [auth]
      summary: The caller's registered passkeys
      responses:
        "200":
          description: Passkeys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeysResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/passkeys/{id}:
    delete:
      operationId: deletePasskey
      tags: [auth]
      summary: Remove a passkey
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/passkeys/register/options:
    post:
      operationId: getPasskeyRegistrationOptions
      tags: [auth]
      summary: WebAuthn creation options
      description: >-
        Pass the body straight to @simplewebauthn/browser's startRegistration.
        The challenge is returned in a signed cookie and is single-use.
      responses:
        "200":
          description: PublicKeyCredentialCreationOptionsJSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/passkeys/register/verify:
    post:
      operationId: verifyPasskeyRegistration
      tags: [auth]
      summary: Store a passkey after verifying the attestation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: The attestation from startRegistration, plus an optional `name`.
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyRegisteredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/passkeys/login/options:
    post:
      operationId: getPasskeyLoginOptions
      tags: [auth]
      summary: WebAuthn request options (usernameless)
      description: >-
        No identifier is asked for: the authenticator says which credential it
        holds.
      responses:
        "200":
          description: PublicKeyCredentialRequestOptionsJSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /auth/passkeys/login/verify:
    post:
      operationId: verifyPasskeyLogin
      tags: [auth]
      summary: Sign in with a passkey
      description: >-
        Answers `requires2fa` when the account also has TOTP on — a passkey does
        not override a second factor its owner turned on here.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: The assertion from startAuthentication.
      responses:
        "200":
          description: Signed in, or owing a 2FA code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Unknown or unverifiable passkey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/oauth/providers:
    get:
      operationId: listOAuthProviders
      tags: [auth]
      summary: Providers this deployment has credentials for
      description: A provider appears only once both its client id and secret are set.
      responses:
        "200":
          description: Configured providers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthProvidersResponse"

  /auth/oauth/accounts:
    get:
      operationId: listLinkedOAuthAccounts
      tags: [auth]
      summary: Provider identities linked to the caller
      responses:
        "200":
          description: Linked accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthAccountsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/oauth/{provider}:
    get:
      operationId: startOAuth
      tags: [auth]
      summary: Redirect to the provider (a browser navigation, not a fetch)
      description: >-
        `mode=link` attaches the identity to the signed-in account instead of
        signing in. Sets a signed, single-use state cookie; the callback is
        refused without it.
      parameters:
      - in: path
        name: provider
        required: true
        schema:
          $ref: "#/components/schemas/OAuthProvider"
      - in: query
        name: mode
        schema:
          type: string
          enum: [link]
      responses:
        "302":
          description: Redirect to the provider, or back to /login with ?oauth_error=
    delete:
      operationId: unlinkOAuthAccount
      tags: [auth]
      summary: Unlink a provider identity
      parameters:
      - in: path
        name: provider
        required: true
        schema:
          $ref: "#/components/schemas/OAuthProvider"
      responses:
        "200":
          description: Unlinked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/oauth/{provider}/callback:
    get:
      operationId: oauthCallback
      tags: [auth]
      summary: Where the provider sends the browser back
      description: >-
        Not called by the frontend. On failure it redirects to
        /login?oauth_error=<code>; for an account with 2FA it redirects to
        /login?mfa=<token>.
      parameters:
      - in: path
        name: provider
        required: true
        schema:
          $ref: "#/components/schemas/OAuthProvider"
      - in: query
        name: code
        schema:
          type: string
      - in: query
        name: state
        schema:
          type: string
      - in: query
        name: error
        schema:
          type: string
      responses:
        "302":
          description: Redirect into the app

  # AUTH — API TOKENS
  /auth/api-tokens:
    get:
      operationId: listApiTokens
      tags: [auth]
      summary: The caller's personal access tokens
      description: The secret is never returned again — `prefix` is what identifies one.
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiTokensResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/SessionRequired"
    post:
      operationId: createApiToken
      tags: [auth]
      summary: Mint a token — the only time its secret is readable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiTokenBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiTokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Token limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/api-tokens/{id}:
    delete:
      operationId: revokeApiToken
      tags: [auth]
      summary: Revoke a token
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /users/me/dashboard:
    get:
      operationId: getMyDashboard
      tags: [users]
      summary: The caller's progress summary and rank
      responses:
        "200":
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/profile:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: The caller's own profile, including their email
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{id}/avatar:
    post:
      operationId: uploadAvatar
      tags: [users]
      summary: Upload an avatar (2 MB max, images only)
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
              required: [avatar]
      responses:
        "200":
          description: Uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # COMPETITIONS
  /competitions/{id}/ctf/{ctfId}/submit:
    post:
      operationId: submitCompetitionFlag
      tags: [competitions]
      summary: Submit a flag within a competition
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      - in: path
        name: ctfId
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFlagBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitionSubmitResponse"
        "403":
          description: Not active, or not joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # UPLOADS
  /uploads/ctf-file:
    post:
      operationId: uploadCtfFile
      tags: [uploads]
      summary: Upload a challenge attachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        "200":
          description: Uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /uploads/ctf-file/sign:
    post:
      operationId: signCtfFileUpload
      tags: [uploads]
      summary: Get a signed URL to upload straight to storage
      description: Answers 501 when object storage is not configured; fall back to /uploads/ctf-file.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUploadBody"
      responses:
        "200":
          description: Signed URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedUploadResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          description: Object storage not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /uploads/download/{id}/{filename}:
    get:
      operationId: downloadCtfFile
      tags: [uploads]
      summary: Download a challenge attachment
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      - in: path
        name: filename
        required: true
        schema:
          type: string
      responses:
        "200":
          description: File contents
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"
  /admin/ctf/{id}/publish:
    post:
      operationId: publishCtf
      tags: [admin]
      summary: Make a draft live, or take it back down
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/lessons/{id}/publish:
    post:
      operationId: publishLesson
      tags: [admin]
      summary: Make a draft lesson live, or take it back down
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/users/{id}/role:
    patch:
      operationId: setUserRole
      tags: [admin]
      summary: Assign a role; revokes that user's sessions
      description: >-
        The role is read from the database on every request, so a change takes
        effect at once. An admin cannot demote themselves out of the ability to
        undo it.
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRoleBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetRoleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/users/recalculate-points:
    post:
      operationId: recalculateAllPoints
      tags: [admin]
      summary: Recompute every user's score from their solves
      responses:
        "200":
          description: Recalculated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/audit-logs:
    get:
      operationId: listAuditLogs
      tags: [admin]
      summary: The 200 most recent audit entries
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogsResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/blocked:
    get:
      operationId: listBlockedTasks
      tags: [admin]
      summary: Users blocked from a challenge or lesson
      responses:
        "200":
          description: Blocked tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockedTasksResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # Auth
    RegisterBody:
      type: object
      properties:
        nickname:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[A-Za-z0-9_]+$"
          description: Letters, numbers and underscores only.
        email:
          type: string
          format: email
        password: &id001
          type: string
          minLength: 10
          pattern: "^(?=.*[a-z])(?=.*[A-Z])(?=.*\\d)(?=.*[^A-Za-z0-9]).{10,}$"
          description: >-
            At least 10 characters, with a lowercase letter, an uppercase letter, a digit
            and a symbol.
        captchaToken:
          type: string
          description: >-
            Cloudflare Turnstile token. Required only when TURNSTILE_ENFORCE is on.
      required: [nickname, email, password]

    LoginBody:
      type: object
      properties:
        nickname:
          type: string
        password:
          type: string
      required: [nickname, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
          nullable: true
        points:
          type: integer
        role:
          type: string
          enum:
          - user
          - author
          - moderator
          - admin
        emailVerified:
          type: boolean
        isBlocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, nickname, email, points, role, emailVerified, isBlocked, createdAt]

    # CTF
    CtfChallenge:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard, insane]
        points:
          type: integer
        solvedCount:
          type: integer
        isSolved:
          type: boolean
        isBlocked:
          type: boolean
        nameUz:
          type: string
          nullable: true
        nameRu:
          type: string
          nullable: true
      required: [id, name, category, difficulty, points, solvedCount, isSolved, isBlocked]

    CtfChallengeDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameUz:
          type: string
          nullable: true
        nameRu:
          type: string
          nullable: true
        description:
          type: string
        descriptionUz:
          type: string
          nullable: true
        descriptionRu:
          type: string
          nullable: true
        category:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard, insane]
        points:
          type: integer
        hintCost:
          type: integer
        fileUrl:
          type: string
          nullable: true
        solvedCount:
          type: integer
        isSolved:
          type: boolean
        isBlocked:
          type: boolean
        hintUsed:
          type: boolean
        wrongAttempts:
          type: integer
      required: [id, name, description, category, difficulty, points, hintCost, solvedCount, isSolved, isBlocked, hintUsed, wrongAttempts]

    CtfStats:
      type: object
      properties:
        totalChallenges:
          type: integer
        categoryCounts:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
              solved:
                type: integer
            required: [category, count, solved]
        mostSolved:
          type: array
          items:
            $ref: "#/components/schemas/CtfChallenge"
        recentlySolved:
          type: array
          items:
            type: object
            properties:
              userId:
                type: integer
              nickname:
                type: string
              ctfName:
                type: string
              solvedAt:
                type: string
                format: date-time
            required: [userId, nickname, ctfName, solvedAt]
      required: [totalChallenges, categoryCounts, mostSolved, recentlySolved]

    SubmitFlagBody:
      type: object
      properties:
        flag:
          type: string
          minLength: 1
          maxLength: 512
      required: [flag]

    FlagSubmitResponse:
      type: object
      properties:
        correct:
          type: boolean
        message:
          type: string
        pointsEarned:
          type: integer
          nullable: true
        wrongAttempts:
          type: integer
        blocked:
          type: boolean
      required: [correct, message, wrongAttempts, blocked]

    # Learn
    LearnCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameUz:
          type: string
          nullable: true
        nameRu:
          type: string
          nullable: true
        lessonCount:
          type: integer
        completedCount:
          type: integer
      required: [id, name, lessonCount, completedCount]

    Lesson:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        titleUz:
          type: string
          nullable: true
        titleRu:
          type: string
          nullable: true
        categoryId:
          type: integer
        categoryName:
          type: string
        points:
          type: integer
        isCompleted:
          type: boolean
        isBlocked:
          type: boolean
        attemptCount:
          type: integer
      required: [id, title, categoryId, categoryName, points, isCompleted, isBlocked, attemptCount]

    LessonDetail:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        titleUz:
          type: string
          nullable: true
        titleRu:
          type: string
          nullable: true
        content:
          type: string
        contentUz:
          type: string
          nullable: true
        contentRu:
          type: string
          nullable: true
        categoryId:
          type: integer
        categoryName:
          type: string
        points:
          type: integer
        isCompleted:
          type: boolean
        isBlocked:
          type: boolean
        attemptCount:
          type: integer
        questions:
          type: array
          items:
            $ref: "#/components/schemas/LessonQuestion"
      required: [id, title, content, categoryId, categoryName, points, isCompleted, isBlocked, attemptCount, questions]

    LessonQuestion:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        questionUz:
          type: string
          nullable: true
        questionRu:
          type: string
          nullable: true
        options:
          type: array
          items:
            type: string
        optionsUz:
          type: array
          items:
            type: string
          nullable: true
        optionsRu:
          type: array
          items:
            type: string
          nullable: true
      required: [id, question, options]

    TestStartResponse:
      type: object
      properties:
        sessionId:
          type: string
        attemptsLeft:
          type: integer
        questions:
          type: array
          items:
            $ref: "#/components/schemas/LessonQuestion"
      required: [sessionId, attemptsLeft, questions]

    SubmitTestBody:
      type: object
      properties:
        sessionId:
          type: string
        answers:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: integer
              selectedOption:
                type: integer
            required: [questionId, selectedOption]
      required: [sessionId, answers]

    TestResult:
      type: object
      properties:
        passed:
          type: boolean
        score:
          type: number
        correctCount:
          type: integer
        totalCount:
          type: integer
        attemptsLeft:
          type: integer
        pointsEarned:
          type: integer
      required: [passed, score, correctCount, totalCount, attemptsLeft, pointsEarned]

    EscapeResponse:
      type: object
      properties:
        escapeCount:
          type: integer
        blocked:
          type: boolean
        timeoutSeconds:
          type: integer
          nullable: true
        message:
          type: string
      required: [escapeCount, blocked, message]

    ModuleSummary:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        titleUz:
          type: string
          nullable: true
        titleRu:
          type: string
          nullable: true
        description:
          type: string
        descriptionUz:
          type: string
          nullable: true
        descriptionRu:
          type: string
          nullable: true
        difficulty:
          type: string
        estimatedHours:
          type: integer
        passScore:
          type: integer
        lessonCount:
          type: integer
        completedCount:
          type: integer
        examBestScore:
          type: integer
        examPassed:
          type: boolean
        certificateSerial:
          type: string
          nullable: true
      required: [id, slug, title, description, difficulty, estimatedHours, passScore, lessonCount, completedCount, examBestScore, examPassed]

    ModuleLesson:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        titleUz:
          type: string
          nullable: true
        titleRu:
          type: string
          nullable: true
        points:
          type: integer
        orderIndex:
          type: integer
        isCompleted:
          type: boolean
      required: [id, title, points, orderIndex, isCompleted]

    ModuleDetail:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        title:
          type: string
        titleUz:
          type: string
          nullable: true
        titleRu:
          type: string
          nullable: true
        description:
          type: string
        descriptionUz:
          type: string
          nullable: true
        descriptionRu:
          type: string
          nullable: true
        difficulty:
          type: string
        estimatedHours:
          type: integer
        passScore:
          type: integer
        examQuestionCount:
          type: integer
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/ModuleLesson"
        completedCount:
          type: integer
        lessonCount:
          type: integer
        examUnlocked:
          type: boolean
        exam:
          type: object
          properties:
            bestScore:
              type: integer
            passed:
              type: boolean
            attemptCount:
              type: integer
          required: [bestScore, passed, attemptCount]
        certificateSerial:
          type: string
          nullable: true
      required: [id, slug, title, description, difficulty, estimatedHours, passScore, examQuestionCount, lessons, completedCount, lessonCount, examUnlocked, exam]

    # No correctOption: the server never sends the answers to the client.
    ModuleQuestion:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        questionUz:
          type: string
          nullable: true
        questionRu:
          type: string
          nullable: true
        options:
          type: array
          items:
            type: string
        optionsUz:
          type: array
          nullable: true
          items:
            type: string
        optionsRu:
          type: array
          nullable: true
          items:
            type: string
      required: [id, question, options]

    ExamStartResponse:
      type: object
      properties:
        sessionId:
          type: string
        passScore:
          type: integer
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ModuleQuestion"
      required: [sessionId, passScore, questions]

    ExamResult:
      type: object
      properties:
        score:
          type: integer
        correct:
          type: integer
        total:
          type: integer
        passScore:
          type: integer
        passed:
          type: boolean
        certificateAvailable:
          type: boolean
      required: [score, correct, total, passScore, passed, certificateAvailable]

    IssueCertificateBody:
      type: object
      properties:
        fullName:
          type: string
          description: The learner's name as it appears on their passport; printed on the certificate.
      required: [fullName]

    Certificate:
      type: object
      properties:
        serial:
          type: string
        fullName:
          type: string
        score:
          type: integer
        issuedAt:
          type: string
          format: date-time
      required: [serial, fullName, score, issuedAt]

    CertificateVerification:
      type: object
      properties:
        serial:
          type: string
        fullName:
          type: string
        score:
          type: integer
        issuedAt:
          type: string
          format: date-time
        moduleTitle:
          type: string
        moduleTitleUz:
          type: string
          nullable: true
        moduleTitleRu:
          type: string
          nullable: true
      required: [serial, fullName, score, issuedAt, moduleTitle]

    DiplomaStatus:
      type: object
      properties:
        totalModules:
          type: integer
        passedModules:
          type: integer
        averageScore:
          type: integer
        available:
          type: boolean
        serial:
          type: string
          nullable: true
        fullName:
          type: string
          nullable: true
        issuedAt:
          type: string
          format: date-time
          nullable: true
      required: [totalModules, passedModules, averageScore, available]

    Diploma:
      type: object
      properties:
        serial:
          type: string
        fullName:
          type: string
        averageScore:
          type: integer
        moduleCount:
          type: integer
        issuedAt:
          type: string
          format: date-time
      required: [serial, fullName, averageScore, moduleCount, issuedAt]

    DiplomaVerification:
      type: object
      properties:
        serial:
          type: string
        fullName:
          type: string
        averageScore:
          type: integer
        moduleCount:
          type: integer
        issuedAt:
          type: string
          format: date-time
      required: [serial, fullName, averageScore, moduleCount, issuedAt]

    # Scoreboard
    ScoreboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: integer
        nickname:
          type: string
        avatarUrl:
          type: string
          nullable: true
        points:
          type: integer
        solvedCtfCount:
          type: integer
        completedLessonsCount:
          type: integer
        titles:
          type: array
          items:
            type: string
      required: [rank, userId, nickname, points, solvedCtfCount, completedLessonsCount, titles]

    ScoreboardResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/ScoreboardEntry"
