          type: integer
        title:
          type: string
        lessonCount:
          type: integer
        learners:
          type: integer
        completedAllLessons:
          type: integer
        examPassed:
          type: integer
        certified:
          type: integer
      required: [moduleId, title, lessonCount, learners, completedAllLessons, examPassed, certified]

    LearnAnalytics:
      type: object
      properties:
        modules:
          type: array
          items:
            $ref: "#/components/schemas/LearnAnalyticsModule"
        diplomasIssued:
          type: integer
      required: [modules, diplomasIssued]

    AdminDashboard:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        totalCtf:
          type: integer
        totalLessons:
          type: integer
        totalCompetitions:
          type: integer
        averageTestResult:
          type: number
        mostSolvedCtf:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              solvedCount:
                type: integer
            required: [id, name, solvedCount]
        mostActiveUsers:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              nickname:
                type: string
              points:
                type: integer
              solvedCount:
                type: integer
            required: [id, nickname, points, solvedCount]
        blockedTasksCount:
          type: integer
      required: [totalUsers, activeUsers, totalCtf, totalLessons, totalCompetitions, averageTestResult, mostSolvedCtf, mostActiveUsers, blockedTasksCount]

    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
      required: [users, total]

    BlockedTasksResponse:
      type: object
      properties:
        blockedCtf:
          type: array
          items:
            type: object
            properties:
              userId:
                type: integer
              nickname:
                type: string
              ctfId:
                type: integer
              ctfName:
                type: string
              reason:
                type: string
              blockedAt:
                type: string
                format: date-time
            required: [userId, nickname, ctfId, ctfName, reason, blockedAt]
        blockedLessons:
          type: array
          items:
            type: object
            properties:
              userId:
                type: integer
              nickname:
                type: string
              lessonId:
                type: integer
              lessonTitle:
                type: string
              reason:
                type: string
              blockedAt:
                type: string
                format: date-time
            required: [userId, nickname, lessonId, lessonTitle, reason, blockedAt]
      required: [blockedCtf, blockedLessons]

    CreateCtfBody:
      type: object
      properties:
        name:
          type: string
        nameUz:
          type: string
          nullable: true
        nameRu:
          type: string
          nullable: true
        description:
          type: string
        descriptionUz:
          type: string
          nullable: true
        descriptionRu:
          type: string
          nullable: true
        category:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard, insane]
        points:
          type: integer
        hint:
          type: string
          nullable: true
        flag:
          type: string
        fileUrl:
          type: string
          nullable: true
      required: [name, description, category, difficulty, points, flag]

    CreateCompetitionBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [public, private]
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        ctfIds:
          type: array
          items:
            type: integer
        inviteCode:
          type: string
          nullable: true
          description: Join code for a private competition. Ignored when type is public, and generated if a private competition is created without one.
        sponsorName:
          type: string
          nullable: true
          description: The sponsor to credit on the event page, e.g. "IT Park Uzbekistan".
        sponsorLogoUrl:
          type: string
          nullable: true
          description: Absolute URL of the sponsor logo shown on the event page.
        sponsorUrl:
          type: string
          nullable: true
          description: Link the sponsor's name and logo point to.
        prize:
          type: string
          nullable: true
          description: The prize on offer, shown to participants (free text).
      required:
      - name
      - startTime
      - endTime

    CreateLessonBody:
      type: object
      properties:
        title:
          type: string
        titleUz:
          type: string
          nullable: true
        titleRu:
          type: string
          nullable: true
        content:
          type: string
        contentUz:
          type: string
          nullable: true
        contentRu:
          type: string
          nullable: true
        categoryId:
          type: integer
        moduleId:
          type: integer
          nullable: true
          description: Attach the lesson to a module, or null for a standalone lesson.
        points:
          type: integer
        questions:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
              questionUz:
                type: string
                nullable: true
              questionRu:
                type: string
                nullable: true
              options:
                type: array
                items:
                  type: string
              optionsUz:
                type: array
                items:
                  type: string
                nullable: true
              optionsRu:
                type: array
                items:
                  type: string
                nullable: true
              correctOption:
                type: integer
            required: [question, options, correctOption]
      required:
      - title
      - content
      - categoryId
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]
    SessionResponse:
      type: object
      properties:
        user:
          oneOf:
          - $ref: "#/components/schemas/User"
          - type: "null"
        permissions:
          type: array
          description: Derived from the role server-side. Absent when signed out.
          items:
            type: string
      required: [user]
    SuspiciousLogin:
      type: object
      properties:
        reasons:
          type: array
          items:
            type: string
            enum: [new_ip, new_device, recent_failed_attempts]
      required: [reasons]
    LoginResult:
      description: >-
        A correct password does not always mean a session: an account with 2FA
        gets an mfaToken to exchange at /auth/2fa/verify instead.
      oneOf:
      - $ref: "#/components/schemas/TwoFactorRequired"
      - $ref: "#/components/schemas/AuthResponse"

    TwoFactorRequired:
      type: object
      properties:
        requires2fa:
          type: boolean
          enum: [true]
        mfaToken:
          type: string
          description: >-
            Short-lived, and carries a distinct JWT audience — it cannot be used
            as a session token.
      required: [requires2fa, mfaToken]
    SessionEntry:
      type: object
      properties:
        id:
          type: integer
        deviceLabel:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        isCurrent:
          type: boolean
      required: [id, createdAt, lastSeenAt, expiresAt, isCurrent]
    SessionsResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionEntry"
      required: [sessions]
    RevokeAllResponse:
      type: object
      properties:
        success:
          type: boolean
        revokedCount:
          type: integer
      required: [success, revokedCount]
    LoginHistoryEntry:
      type: object
      properties:
        id:
          type: integer
        ipAddress:
          type: string
          nullable: true
        deviceLabel:
          type: string
          nullable: true
        success:
          type: boolean
        failureReason:
          type: string
          nullable: true
          enum: [unknown_user, bad_password, bad_totp, blocked, email_unverified, null]
        suspicious:
          type: boolean
        suspiciousReasons:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required: [id, success, suspicious, suspiciousReasons, createdAt]
    LoginHistoryResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LoginHistoryEntry"
      required: [entries]
    ChangePasswordBody:
      type: object
      properties:
        oldPassword:
          type: string
        newPassword: *id001
      required: [oldPassword, newPassword]
    ChangePasswordResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        revokedSessionCount:
          type: integer
      required: [success]
    ForgotPasswordBody:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]
    ResetPasswordBody:
      type: object
      properties:
        token:
          type: string
        password: *id001
      required: [token, password]
    PasswordBody:
      type: object
      properties:
        password:
          type: string
      required: [password]
    TwoFactorStatus:
      type: object
      properties:
        enabled:
          type: boolean
        backupCodesRemaining:
          type: integer
      required: [enabled, backupCodesRemaining]
    TwoFactorSetupResponse:
      type: object
      properties:
        secret:
          type: string
          description: Base32, for manual entry.
        otpauthUri:
          type: string
          description: otpauth:// URI for a QR code.
      required: [secret, otpauthUri]
    TwoFactorCodeBody:
      type: object
      properties:
        code:
          type: string
          minLength: 1
      required: [code]
    DisableTwoFactorBody:
      type: object
      properties:
        password:
          type: string
        code:
          type: string
      required: [password, code]
    VerifyTwoFactorBody:
      type: object
      properties:
        mfaToken:
          type: string
        code:
          type: string
          description: A 6-digit TOTP code, or a backup code. Case and dashes are ignored.
          minLength: 1
      required: [mfaToken, code]
    BackupCodesResponse:
      type: object
      properties:
        success:
          type: boolean
        backupCodes:
          type: array
          description: Shown once. Stored hashed; there is no way to read them again.
          items:
            type: string
      required: [backupCodes]
    PasskeyEntry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        deviceType:
          type: string
          nullable: true
        backedUp:
          type: boolean
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, backedUp, createdAt]
    PasskeysResponse:
      type: object
      properties:
        passkeys:
          type: array
          items:
            $ref: "#/components/schemas/PasskeyEntry"
      required: [passkeys]
    PasskeyRegisteredResponse:
      type: object
      properties:
        success:
          type: boolean
        name:
          type: string
      required: [success, name]
    OAuthProvider:
      type: string
      enum: [google, github, discord]
    OAuthProvidersResponse:
      type: object
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/OAuthProvider"
      required: [providers]
    OAuthAccount:
      type: object
      properties:
        provider:
          $ref: "#/components/schemas/OAuthProvider"
        providerEmail:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [provider, createdAt]
    OAuthAccountsResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/OAuthAccount"
      required: [accounts]
    ApiScope:
      type: string
      enum: [profile:read, ctf:read, ctf:submit, learn:read, scoreboard:read]
    ApiTokenEntry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        prefix:
          type: string
          description: Enough to tell tokens apart, not enough to reconstruct one.
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/ApiScope"
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, prefix, scopes, createdAt]
    ApiTokensResponse:
      type: object
      properties:
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/ApiTokenEntry"
        availableScopes:
          type: array
          items:
            $ref: "#/components/schemas/ApiScope"
      required: [tokens, availableScopes]
    CreateApiTokenBody:
      type: object
      properties:
        name:
          type: string
          maxLength: 64
          minLength: 1
        scopes:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ApiScope"
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 365
          nullable: true
      required: [name, scopes]
    CreateApiTokenResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/ApiScope"
        expiresAt:
          type: string
          format: date-time
          nullable: true
        token:
          type: string
          description: Shown once. Only its hash is stored.
      required: [id, name, scopes, token]
    DashboardResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: integer
            nickname:
              type: string
            points:
              type: integer
            rank:
              type: integer
              description: 0 for accounts excluded from scoring.
          required: [id, nickname, points, rank]
        progress:
          type: object
          properties:
            solvedCtfCount:
              type: integer
            completedLessonCount:
              type: integer
            titleCount:
              type: integer
          required: [solvedCtfCount, completedLessonCount, titleCount]
        recent:
          type: object
          properties:
            solvedCtf:
              type: array
              items:
                type: object
                properties:
                  ctfId:
                    type: integer
                  solvedAt:
                    type: string
                    format: date-time
                    nullable: true
            completedLessons:
              type: array
              items:
                type: object
                properties:
                  lessonId:
                    type: integer
                  completedAt:
                    type: string
                    format: date-time
                    nullable: true
        titles:
          type: array
          items:
            $ref: "#/components/schemas/Title"
      required: [user, progress, recent, titles]
    CompetitionSubmitResponse:
      type: object
      properties:
        correct:
          type: boolean
        alreadySolved:
          type: boolean
        blocked:
          type: boolean
        wrongAttempts:
          type: integer
        pointsEarned:
          type: integer
      required: [correct]
    UploadResponse:
      type: object
      properties:
        url:
          type: string
        filename:
          type: string
      required: [url]
    SignUploadBody:
      type: object
      properties:
        filename:
          type: string
        contentType:
          type: string
        size:
          type: integer
          minimum: 1
          maximum: 26214400
          description: Size of the file in bytes. Checked before a URL is signed, so an oversized upload is refused before it starts.
      required:
      - size
    SignedUploadResponse:
      type: object
      properties:
        uploadUrl:
          type: string
        publicUrl:
          type: string
      required: [uploadUrl, publicUrl]
    AdminCtfTask:
      type: object
      description: >-
        The stored row. `flag` is the sha256$ hash, never the plaintext — which
        is unrecoverable by design.
      properties:
        id:
          type: integer
        name:
          type: string
        nameUz:
          type: string
          nullable: true
        nameRu:
          type: string
          nullable: true
        description:
          type: string
        descriptionUz:
          type: string
          nullable: true
        descriptionRu:
          type: string
          nullable: true
        category:
          type: string
        difficulty:
          type: string
        points:
          type: integer
        hint:
          type: string
          nullable: true
        hintCost:
          type: integer
        fileUrl:
          type: string
          nullable: true
        authorId:
          type: integer
          nullable: true
        isPublished:
          type: boolean
        solvedCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, description, category, difficulty, points, isPublished]
    AdminCtfListResponse:
      type: object
      properties:
        challenges:
          type: array
          items:
            $ref: "#/components/schemas/AdminCtfTask"
      required: [challenges]
    UpdateCtfBody:
      type: object
      description: >-
        Every field is optional; anything the caller's role may not write is
        dropped rather than rejected.
      properties:
        name:
          type: string
        nameUz:
          type: string
          nullable: true
        nameRu:
          type: string
          nullable: true
        description:
          type: string
        descriptionUz:
          type: string
          nullable: true
        descriptionRu:
          type: string
          nullable: true
        category:
          type: string
        difficulty:
          type: string
        points:
          type: integer
          description: Admin only.
        hint:
          type: string
        hintCost:
          type: integer
          description: Admin only.
        flag:
          type: string
          description: Plaintext; hashed before storage.
        fileUrl:
          type: string
        isPublished:
          type: boolean
          description: Admin only.

    PublishBody:
      type: object
      properties:
        isPublished:
          type: boolean
          default: true

    PublishResponse:
      type: object
      properties:
        success:
          type: boolean
        isPublished:
          type: boolean
      required: [success, isPublished]
    AdminLessonQuestion:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        questionUz:
          type: string
          nullable: true
        questionRu:
          type: string
          nullable: true
        options:
          type: array
          items:
            type: string
        correctOption:
          type: integer
        orderIndex:
          type: integer
      required: [question, options, correctOption]
    AdminLesson:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        titleUz:
          type: string
          nullable: true
        titleRu:
          type: string
          nullable: true
        content:
          type: string
        contentUz:
          type: string
          nullable: true
        contentRu:
          type: string
          nullable: true
        categoryId:
          type: integer
        categoryName:
          type: string
          nullable: true
        points:
          type: integer
        authorId:
          type: integer
          nullable: true
        isPublished:
          type: boolean
        questions:
          type: array
          items:
            $ref: "#/components/schemas/AdminLessonQuestion"
        createdAt:
          type: string
          format: date-time
      required: [id, title, categoryId, points]
    AdminLessonListResponse:
      type: object
      properties:
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/AdminLesson"
      required: [lessons]
    UpdateLessonBody:
      type: object
      properties:
        title:
          type: string
        titleUz:
          type: string
          nullable: true
        titleRu:
          type: string
          nullable: true
        content:
          type: string
        contentUz:
          type: string
          nullable: true
        contentRu:
          type: string
          nullable: true
        categoryId:
          type: integer
        points:
          type: integer
          description: Admin only.
        isPublished:
          type: boolean
          description: Admin only.
        questions:
          type: array
          description: Replaces the whole set when present.
          items:
            $ref: "#/components/schemas/AdminLessonQuestion"

    UpdateCompetitionBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [public, private]
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        inviteCode:
          type: string
          nullable: true
        sponsorName:
          type: string
          nullable: true
        sponsorLogoUrl:
          type: string
          nullable: true
        sponsorUrl:
          type: string
          nullable: true
        prize:
          type: string
          nullable: true

    SetRoleBody:
      type: object
      properties:
        role:
          type: string
          enum: [user, author, moderator, admin]
      required: [role]
    SetRoleResponse:
      type: object
      properties:
        success:
          type: boolean
        role:
          type: string
          enum: [user, author, moderator, admin]
        revokedSessionCount:
          type: integer
      required: [success, role]
    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        actorUserId:
          type: integer
          nullable: true
        action:
          type: string
        targetType:
          type: string
        targetId:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, action, targetType, createdAt]
    AuditLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
      required: [logs]
  responses:
    Unauthorized:
      description: Not signed in, or the token is invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Signed in, but not allowed to do this
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SessionRequired:
      description: >-
        Needs an interactive session. API tokens are refused on anything that
        changes credentials, 2FA or sessions.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
