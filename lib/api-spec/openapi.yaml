        sponsorName:
          type: string
          nullable: true
        prize:
          type: string
          nullable: true
      required: [id, name, type, startTime, endTime, status, participantCount, ctfCount, isJoined]

    CompetitionDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [public, private]
